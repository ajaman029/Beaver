<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritzz I'm Sorry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Floating hearts background */
        .hearts-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            opacity: 0.15;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            width: 480px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            animation: cardAppear 1s ease-out;
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: scale(0.8) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #e74c3c, #e91e63, #9b59b6, #e74c3c);
            border-radius: 25px;
            z-index: -1;
            background-size: 300% 300%;
            animation: borderGlow 4s ease infinite;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .sad-face {
            font-size: 70px;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 52px;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(231, 76, 60, 0.4);
            animation: fadeIn 1.2s ease-out 0.3s both;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            animation: fadeIn 1.2s ease-out 0.5s both;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(to right, transparent, #e74c3c, transparent);
            margin: 0 auto 30px;
            animation: fadeIn 1.2s ease-out 0.6s both;
        }

        .message {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 30px;
            animation: fadeIn 1.2s ease-out 0.7s both;
        }

        .message p {
            margin-bottom: 12px;
        }

        .promise-box {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.15), rgba(233, 30, 99, 0.15));
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 16px;
            padding: 22px 28px;
            margin-bottom: 30px;
            animation: fadeIn 1.2s ease-out 0.9s both;
        }

        .promise-box p {
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            color: #ff6b6b;
            font-weight: 600;
        }

        .promise-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .hearts-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeIn 1.2s ease-out 1.1s both;
        }

        .heart {
            font-size: 24px;
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .heart:nth-child(2) { animation-delay: 0.2s; }
        .heart:nth-child(3) { animation-delay: 0.4s; }
        .heart:nth-child(4) { animation-delay: 0.6s; }
        .heart:nth-child(5) { animation-delay: 0.8s; }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            60% { transform: scale(1); }
        }

        .footer-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
            animation: fadeIn 1.2s ease-out 1.3s both;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Teardrops */
        .teardrop {
            position: absolute;
            width: 8px;
            height: 12px;
            background: rgba(100, 180, 255, 0.4);
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            animation: fall 3s ease-in infinite;
        }

        .teardrop:nth-child(1) { left: 30%; animation-delay: 0s; top: -10px; }
        .teardrop:nth-child(2) { left: 50%; animation-delay: 1s; top: -10px; }
        .teardrop:nth-child(3) { left: 70%; animation-delay: 2s; top: -10px; }

        @keyframes fall {
            0% { opacity: 0; transform: rotate(45deg) translateY(0); }
            20% { opacity: 0.6; }
            100% { opacity: 0; transform: rotate(45deg) translateY(120px); }
        }
    </style>
</head>
<body>

    <!-- Floating hearts background -->
    <div class="hearts-bg" id="heartsBg"></div>

    <div class="card">
        <div class="teardrop"></div>
        <div class="teardrop"></div>
        <div class="teardrop"></div>

        <div class="sad-face">🥺</div>
        <h1 class="title">I'm Sorry my Beaver</h1>
        <div class="divider"></div>

        <div class="message">
            <p>I shouldn't have said what i said yesterday even we are having fun. I messed up and I am really sorry for what I said</p>
            <p>I love you. I won't hurt you next time.</p>
        </div>

        <div class="promise-box">
            <div class="promise-icon">🤞</div>
            <p>I promise — I won't repeat the same mistake again. You have my word.</p>
        </div>

        <div class="hearts-row">
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
        </div>

        <p class="footer-text">Please forgive me 💔</p>
    </div>

    <script>
        // Generate floating hearts in background
        const bg = document.getElementById('heartsBg');
        const symbols = ['💔', '❤️', '🥀', '💕', '🌹'];
        for (let i = 0; i < 25; i++) {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (14 + Math.random() * 18) + 'px';
            heart.style.animationDuration = (8 + Math.random() * 12) + 's';
            heart.style.animationDelay = (Math.random() * 10) + 's';
            bg.appendChild(heart);
        }
    </script>
</body>
</html>
